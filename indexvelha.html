<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo da Velha Personalizado</title>
    <link rel="stylesheet" href="velha.css">
</head>
<body>

    <h2>Jogo da Velha Personalizado</h2>

    <div class="setup-container">
        <div class="player-box">
            <input type="text" id="p1-name" value="Jogador 1">
            <label>Foto do X:</label>
            <input type="file" id="p1-file" accept="image/*">
        </div>
        <div class="player-box">
            <input type="text" id="p2-name" value="Jogador 2">
            <label>Foto do O:</label>
            <input type="file" id="p2-file" accept="image/*">
        </div>
    </div>

    <div class="stats-bar">
        <span>Tempo: <span id="timer">00:00</span></span>
        <span>Placar: <span id="score-display">0 - 0</span></span>
    </div>

    <div class="turn-indicator" id="turn-text">Vez de: Jogador 1</div>

    <div class="board" id="board">
        <div class="cell" data-index="0"></div>
        <div class="cell" data-index="1"></div>
        <div class="cell" data-index="2"></div>
        <div class="cell" data-index="3"></div>
        <div class="cell" data-index="4"></div>
        <div class="cell" data-index="5"></div>
        <div class="cell" data-index="6"></div>
        <div class="cell" data-index="7"></div>
        <div class="cell" data-index="8"></div>
    </div>

    <button class="btn-reset" onclick="resetGame()">Reiniciar Jogo</button>

    <script src="velha.js"></script>
</body>
</html>
